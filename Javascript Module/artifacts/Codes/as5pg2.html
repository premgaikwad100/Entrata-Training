<html>
<head>
	<script>
	function rev()
	{
		var arr = new Array(4)
		
		var i
		for( i=0;i<4;i++)
		{
		arr[i]=parseInt(prompt('enter any number'))
		}
		arr.reverse()
		for( i=0;i<4;i++)
		{
		document.write(arr[i]+" ")
		}
		
	}
	</script>	
</head>	
<body>
	<script>
		
		rev()
	</script>
</body>
</html>
