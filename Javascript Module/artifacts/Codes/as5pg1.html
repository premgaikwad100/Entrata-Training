<html>
<head>
	<script>
		function fibo()
		{
			 var i ,n3,n1=0,n2=1
			 document.write(n1+ " "+n2+" ")
			 for(i=0;i<12;i++)//loop starts from 2 because 0 and 1 are already printed    
			 {    
			  n3=n1+n2;   
			if(n3<100)
			{
			  document.write(" "+n3);  
			}			  
			  n1=n2;    
			  n2=n3; 

			 }			  
		 } 
	</script>
<body>
	<script>
		//var count=100
		fibo()
	</script>
</body>
</html>
