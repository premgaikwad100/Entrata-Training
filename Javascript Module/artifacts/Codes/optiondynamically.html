<html>
<head>
<script>
function igm()
{
	with(document.forms.f1)
	{
		s1[0].value=1
		s1[0].text="chess"
		s1[1].value=2
		s1[1].text="tt"	
	}
}

function ogm()
{
	with(document.forms.f1)
	{
		s1[0].value=1
		s1[0].text="cricket"
		s1[1].value=2
		s1[1].text="volley"	
	}
}	


</script>
</head>
<body>
<form name="f1">
<input type="radio" name="r1" checked="true" onclick="igm()">indoor<br>
<input type="radio" name="r1" onclick="ogm()">outdoor<br>
<select name="s1">
<option value=1>chess</option>
<option value=2>tt</option>
</select>

</form>
</body>
</html>
