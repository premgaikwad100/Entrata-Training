<html>
<head>
	<script>
	function add()
	{
	with(window.document.forms.form1)
	{
	  
	  t3.value = parseInt((t1.value)) + parseInt((t2.value))
	}
	}
	
	function sub()
	{
	with(window.document.forms.form1)
	{
	  
	  t3.value = parseInt((t1.value)) - parseInt((t2.value))
	}
	}
	
	function div()
	{
	with(window.document.forms.form1)
	{
	  
	  t3.value = parseInt((t1.value)) / parseInt((t2.value))
	}
	}
	function mod()
	{
	with(window.document.forms.form1)
	{
	  
	  t3.value = parseInt((t1.value)) % parseInt((t2.value))
	}
	}
	</script>  
</head>
<body>

	<form action="" method ="post" name="form1"/>
	<center><h1>Simple calculator program</center></h1>
	<br><br>
	Enter First No:
	<input type="text"  name="t1" />
	<br>
	<br>
	Enter Second No:
	<input type="text"  name="t2" />
	<br>
	<br>
	<br>
	result:
	<input type="text"  name="t3" />
	<br> 
	<br>
	<button onclick="sub()"> <img src="minus.jpg" height="100" width="100"> </button>
	<button onclick="mod()"><img src="multi.jpg" height="100" width="100" >	</button>
	<button onclick="add()"> <img src="plus.jpg" height="100" width="100" ></button>
</body>
</html>
