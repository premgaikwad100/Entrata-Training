<html>
<head>
<script>
   function Game(a)
   {
      with(document.forms.f12)
      {
	    if(a=="indoor")
		{
		s1[0].value=1
		s1[0].text="chess"
		
		s1[1].value=2
		s1[1].text="carrom"
		}
		else
		{
		
	    s1[0].value=1
		s1[0].text="football"
		
		s1[1].value=2
		s1[1].text="Base-ball"
	   }
	  }	
	  
	  
	  
	} 

  
</script>
</head>
<body>
<form name="f12" action="" method="post">
<input type="radio" name="c1" value="indoor" checked="true" onclick="Game(this.value)"> indoor game<br>
<input type="radio" name="c1" value="outdoor" onclick="Game(this.value)">outdoor game<br>

<select name="s1">
<option value=1 >chess</option>
<option value=2>carrom</option>

</select>
</form>
</body>
</html>
