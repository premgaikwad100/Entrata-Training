
<html>
<head>
<title>Rollover Text</title>
</head>
<body>
    

<a>
<IMG height="200" src="noimage.gif" width="150" border="0" name="cover">
</a>



<A onmouseover="document.cover.src='mobile.jpg'">
<B><U>Mobile</U></B>
</A>
<BR>
<A onmouseover="document.cover.src='computer.jpg'">
<B><U>Computer</U></B>
</A>
<BR>
<A onmouseover="document.cover.src='index.jpg'">
<B><U>iPhone</U></B>
</A>

</body>
</html>
